name: kings_ledger
description: "AI-Powered Personal CFO"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  cupertino_icons: ^1.0.6

  # Storage & State
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.1
  uuid: ^4.3.3

  # Core Logic
  telephony: ^0.2.0
  intl: ^0.19.0 # For currency formatting
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
